name: Automated Model Training

on:
  schedule:
    # Run every 3 days at 2:00 AM UTC
    - cron: '0 2 */3 * *'
  workflow_dispatch:
  push:
    paths:
      - 'app/data/**'
      - 'data/**'

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('punkt'); nltk.download('wordnet'); nltk.download('stopwords'); nltk.download('vader_lexicon')"

      - name: Run Model Training
        run: |
          cd app
          python main.py --train  # You may need to provide a CLI flag or entrypoint for training only
        env:
          GITHUB_ACTIONS: "true"

      - name: Upload models and reports
        uses: actions/upload-artifact@v3
        with:
          name: trained-models
          path: |
            app/models/*.pkl
            app/reports/**
            app/models/training_metadata.json
          retention-days: 30
