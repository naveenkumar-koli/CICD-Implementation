name: Automated Model Training

on:
  schedule:
    - cron: '0 2 */3 * *'   # Every 3 days at 2 AM UTC
  workflow_dispatch:          # Manual trigger from GitHub UI
  push:
    paths:
      - 'app/data/**'
      - 'data/**'

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          nltk.download('punkt')
          nltk.download('punkt_tab')
          nltk.download('wordnet')
          nltk.download('stopwords')
          nltk.download('vader_lexicon')
          nltk.download('averaged_perceptron_tagger')
          "

      - name: Train model (with DagsHub MLflow tracking)
        env:
          DAGSHUB_USER:  ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_REPO:  "CICD-Implementation"
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USER }}/CICD-Implementation.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USER }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          GITHUB_ACTIONS: "true"
        run: |
          cd app
          python model_trainer.py

      - name: Upload models and reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            app/models/*.pkl
            app/models/training_metadata.json
            app/reports/**
          retention-days: 30
