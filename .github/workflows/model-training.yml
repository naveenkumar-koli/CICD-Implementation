name: MLOps Pipeline — Train → Gate → Deploy

on:
  schedule:
    - cron: '0 2 */3 * *'     # Every 3 days at 2 AM UTC
  workflow_dispatch:            # Manual trigger
  push:
    paths:
      - 'app/data/**'          # Auto-trigger on new data

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Train Model + Log to DagsHub MLflow
  # ─────────────────────────────────────────────────────────────────
  train-model:
    name: Train Model
    runs-on: ubuntu-latest

    outputs:
      accuracy:  ${{ steps.read_meta.outputs.accuracy }}
      f1_score:  ${{ steps.read_meta.outputs.f1_score }}
      timestamp: ${{ steps.read_meta.outputs.timestamp }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt','punkt_tab','wordnet','stopwords','vader_lexicon','averaged_perceptron_tagger']:
              nltk.download(pkg, quiet=True)
          print('NLTK data ready')
          "

      - name: Train model (logs to DagsHub MLflow)
        env:
          DAGSHUB_USER:               ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN:              ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_REPO:               "CICD-Implementation"
          MLFLOW_TRACKING_URI:        "https://dagshub.com/${{ secrets.DAGSHUB_USER }}/CICD-Implementation.mlflow"
          MLFLOW_TRACKING_USERNAME:   ${{ secrets.DAGSHUB_USER }}
          MLFLOW_TRACKING_PASSWORD:   ${{ secrets.DAGSHUB_TOKEN }}
          GITHUB_ACTIONS:             "true"
        run: |
          cd app
          python model_trainer.py
          echo "Training complete"

      - name: Read training metadata
        id: read_meta
        run: |
          python -c "
          import json, os
          path = 'app/models/training_metadata.json'
          if not os.path.exists(path):
              print('::error::training_metadata.json not found - training may have failed')
              exit(1)
          with open(path) as f:
              m = json.load(f)
          print(f'Accuracy : {m[\"accuracy\"]:.4f}')
          print(f'F1 Score : {m[\"cv_f1_score\"]:.4f}')
          print(f'Samples  : {m[\"total_samples\"]}')
          # Export as step outputs
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'accuracy={m[\"accuracy\"]}\n')
              out.write(f'f1_score={m[\"cv_f1_score\"]}\n')
              out.write(f'timestamp={m[\"timestamp\"]}\n')
          "

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            app/models/*.pkl
            app/models/training_metadata.json
            app/reports/**
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Quality Gate (runs after training)
  # ─────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: train-model           # runs right after train-model in same workflow

    outputs:
      passed: ${{ steps.gate.outputs.passed }}

    steps:
      - name: Check quality thresholds
        id: gate
        run: |
          python -c "
          import sys
          accuracy = float('${{ needs.train-model.outputs.accuracy }}')
          f1_score = float('${{ needs.train-model.outputs.f1_score }}')
          timestamp = '${{ needs.train-model.outputs.timestamp }}'

          print('=' * 55)
          print(f'Run timestamp : {timestamp}')
          print(f'Accuracy      : {accuracy:.4f}  (threshold >= 0.75)')
          print(f'F1 Score      : {f1_score:.4f}  (threshold >= 0.70)')
          print('=' * 55)

          if accuracy >= 0.75 and f1_score >= 0.70:
              print('QUALITY GATE: PASSED ✅')
          else:
              reasons = []
              if accuracy < 0.75: reasons.append(f'Accuracy {accuracy:.4f} < 0.75')
              if f1_score < 0.70:  reasons.append(f'F1 {f1_score:.4f} < 0.70')
              print(f'QUALITY GATE: FAILED ❌  Reasons: {\" | \".join(reasons)}')
              sys.exit(1)
          "
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: Open GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: '🚨 Quality Gate Failed — Deployment Blocked',
              body:  `## Quality Gate Failed\n\n` +
                     `**Accuracy:** ${{ needs.train-model.outputs.accuracy }}\n` +
                     `**F1 Score:** ${{ needs.train-model.outputs.f1_score }}\n` +
                     `**Timestamp:** ${{ needs.train-model.outputs.timestamp }}\n\n` +
                     `Deployment was blocked. Previous model is still live.\n\n` +
                     `[View Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['mlops', 'model-quality']
            });

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Push models to HF Hub + Deploy app to HF Spaces
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to HuggingFace
    runs-on: ubuntu-latest
    needs: [train-model, quality-gate]   # only runs if both pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install HuggingFace Hub
        run: pip install huggingface-hub

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: app/models/

      - name: List downloaded model files
        run: |
          echo "=== Model files ready for deploy ==="
          ls -lh app/models/

      - name: Push models to HuggingFace Hub (Model Registry)
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi, create_repo

          api      = HfApi(token=os.environ['HF_TOKEN'])
          username = os.environ['HF_USERNAME']
          repo_id  = f'{username}/sales-sentiment-model'

          # Create model repo if needed
          create_repo(repo_id, token=os.environ['HF_TOKEN'],
                      repo_type='model', exist_ok=True)
          print(f'Model repo: https://huggingface.co/{repo_id}')

          # Upload all model files
          for fname in ['sentiment_model_5000.pkl',
                        'tfidf_vectorizer_5000.pkl',
                        'label_encoder_5000.pkl',
                        'training_metadata.json']:
              fpath = f'app/models/{fname}'
              if os.path.exists(fpath):
                  api.upload_file(
                      path_or_fileobj=fpath,
                      path_in_repo=fname,
                      repo_id=repo_id,
                      repo_type='model',
                  )
                  print(f'Uploaded: {fname}')
              else:
                  print(f'Skipped (not found): {fname}')

          print('Model registry updated!')
          "

      - name: Deploy app to HuggingFace Spaces
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi, create_repo

          api      = HfApi(token=os.environ['HF_TOKEN'])
          username = os.environ['HF_USERNAME']
          space_id = f'{username}/sales-sentiment-api'

          # Create Space (Docker type) if it does not exist
          create_repo(space_id, token=os.environ['HF_TOKEN'],
                      repo_type='space', space_sdk='docker', exist_ok=True)
          print(f'Space: https://huggingface.co/spaces/{space_id}')

          # Upload Dockerfile
          api.upload_file(path_or_fileobj='Dockerfile', path_in_repo='Dockerfile',
                          repo_id=space_id, repo_type='space')

          # Upload requirements
          api.upload_file(path_or_fileobj='requirements.txt', path_in_repo='requirements.txt',
                          repo_id=space_id, repo_type='space')

          # Upload entire app folder (code + models + templates + static)
          api.upload_folder(folder_path='app', path_in_repo='app',
                            repo_id=space_id, repo_type='space')

          print('Deployment complete!')
          print(f'Live URL: https://{username.replace(\"-\",\"-\")}-sales-sentiment-api.hf.space')
          "

      - name: Print deployment summary
        run: |
          echo "=================================================="
          echo "DEPLOYMENT COMPLETE!"
          echo "Model Registry : https://huggingface.co/${{ secrets.HF_USERNAME }}/sales-sentiment-model"
          echo "Live App       : https://huggingface.co/spaces/${{ secrets.HF_USERNAME }}/sales-sentiment-api"
          echo "DagsHub        : https://dagshub.com/${{ secrets.DAGSHUB_USER }}/CICD-Implementation"
          echo "=================================================="
